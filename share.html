<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>집피드에서 보기</title>
    <meta name="description" content="집피드 앱에서 공유된 부동산 정보를 확인하세요." />
    <meta property="og:title" content="집피드에서 보기" />
    <meta property="og:description" content="집피드 앱에서 공유된 부동산 정보를 확인하세요." />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="index.html">집피드</a>
        <div class="nav-links">
          <a href="support.html">지원</a>
          <a href="privacy.html">개인정보처리방침</a>
          <a href="terms.html">이용약관</a>
        </div>
      </nav>
    </header>

    <main class="page">
      <article class="doc">
        <p class="eyebrow">공유 링크</p>
        <h1>집피드에서 확인하세요</h1>
        <p class="lead">
          공유된 단지, 거래, 피드 정보는 집피드 앱에서 더 자세히 확인할 수 있습니다.
        </p>

        <div class="share-panel">
          <h2 id="share-title">공유된 정보</h2>
          <p id="share-description">앱에서 링크를 열면 관련 화면으로 이동합니다.</p>
          <div class="actions">
            <a class="button primary" id="open-app" href="index.html">앱에서 열기</a>
            <a class="button secondary" href="support.html">문의하기</a>
          </div>
        </div>
      </article>
    </main>

    <footer class="footer">
      <p>집피드 공유 페이지</p>
    </footer>

    <script>
      const params = new URLSearchParams(window.location.search);
      const type = params.get("type") || "content";
      const id = params.get("id") || "";
      const title = params.get("title") || "";
      const titleEl = document.getElementById("share-title");
      const descriptionEl = document.getElementById("share-description");
      const openApp = document.getElementById("open-app");

      if (title) {
        titleEl.textContent = title;
      } else if (type === "complex") {
        titleEl.textContent = "공유된 단지";
      } else if (type === "deal") {
        titleEl.textContent = "공유된 거래 정보";
      }

      descriptionEl.textContent =
        id ? `공유 ID: ${id}. 앱에서 열면 관련 화면으로 이동합니다.` : "앱에서 링크를 열면 관련 화면으로 이동합니다.";

      const deepLink = id ? `app://share/${encodeURIComponent(type)}/${encodeURIComponent(id)}` : "app://";
      openApp.setAttribute("href", deepLink);
    </script>
  </body>
</html>
